<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم المحمية - Dashboard JWT</title>
    <script>
      // 🔒 الفحص المبدئي السريع: لو مفيش توكن أصلاً اطرد اليوزر فوراً
      const token = localStorage.getItem("access_token");
      if (!token) {
        alert("غير مسموح بالدخول بدون Token! ❌");
        window.location.href = "auth.html";
      }
    </script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }
      .dashboard-box {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 500px;
        width: 100%;
      }
      h1 {
        color: #2ecc71;
        margin-bottom: 15px;
      }
      p {
        color: #555;
        margin-bottom: 15px;
        font-size: 18px;
      }
      .secret-data {
        background: #fffbcb;
        border: 1px dashed #ffd43b;
        padding: 15px;
        border-radius: 6px;
        font-weight: bold;
        color: #856404;
        margin-bottom: 20px;
        display: none;
      }
      button {
        padding: 10px 20px;
        background: #e74c3c;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover {
        background: #c0392b;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-box">
      <h1>مرحباً بك في المنطقة الأمنة 🛡️</h1>
      <p id="welcome-msg">جاري التحقق من الـ Token مع السيرفر...</p>

      <div id="secret-box" class="secret-data"></div>

      <button onclick="logout()">تسجيل الخروج (Logout)</button>
    </div>

    <script>
      const BACKEND_URL = "http://127.0.0.1:8000/v1";
      const currentToken = localStorage.getItem("access_token");

      // دالة بتبعت الـ Request للسيرفر وحاطة التوكن جوه الـ Header
      async function fetchProtectedData() {
        try {
          const response = await fetch(`${BACKEND_URL}/dashboard`, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${currentToken}`,
              "Content-Type": "application/json",
            },
          });

          const result = await response.json();

          if (response.ok) {
            // لو السيرفر وافق وفحص الهيدر ولقاه تمام
            document.getElementById("welcome-msg").innerText = result.Message;

            // إظهار البيانات السرية الجاية من السيرفر
            const secretBox = document.getElementById("secret-box");
            secretBox.innerText = result.SecretData;
            secretBox.style.display = "block";
          } else {
            // لو السيرفر رفض التوكن (مثلاً منتهي الصلاحية أو مضروب)
            alert(
              "السيرفر رفض الـ Token: " + (result.detail || "جلسة غير صالحة"),
            );
            logout();
          }
        } catch (error) {
          document.getElementById("welcome-msg").innerText =
            "فشل الاتصال بالسيرفر لفحص التوكن.";
        }
      }

      // أول ما الصفحة تفتح، نادي دالة الفحص فوراً
      if (currentToken) {
        fetchProtectedData();
      }

      // دالة تسجيل الخروج
      function logout() {
        localStorage.removeItem("access_token");
        window.location.href = "auth.html";
      }
    </script>
  </body>
</html>
