version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile 
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - SECRET_KEY=your_super_secret_key_here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    restart: always

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80" 
    volumes:
      - ./FrontEnd:/usr/share/nginx/html 
    restart: always
