version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile 
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - SECRET_KEY=your_super_secret_key_here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    restart: always
    depends_on:
      - db
      - frontend
      - redis


  frontend:
    image: nginx:alpine
    ports:
      - "5500:80" 
    volumes:
      - ./FrontEnd:/usr/share/nginx/html 
    restart: always
  
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

    restart: "always"

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "Bahaa$$56179011"
      MYSQL_DATABASE: "socialDB"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
      
volumes:
  mysql_data: